name: windows-build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  # Pin protoc version for reproducible builds
  PROTOC_VERSION: "29.3"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Fyne CLI info
        shell: pwsh
        run: |
          fyne --help
          fyne package --help

      - name: Download protoc (Windows x64) into repo path
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $dst = "internal/infrastructure/protocbin/protoc_windows_amd64.zip"
          New-Item -ItemType Directory -Force -Path (Split-Path $dst) | Out-Null

          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v$env:PROTOC_VERSION/protoc-$env:PROTOC_VERSION-win64.zip"
          Write-Host "Downloading protoc from $url"

          # Use TLS 1.2+ in older PS environments
          try { [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12 } catch {}

          Invoke-WebRequest -Uri $url -OutFile $dst

      - name: Verify protoc zip present
        shell: pwsh
        run: |
          $p = "internal/infrastructure/protocbin/protoc_windows_amd64.zip"
          if (!(Test-Path $p)) { throw "Missing $p" }
          if ((Get-Item $p).Length -eq 0) { throw "protoc zip is empty placeholder: $p" }
          Write-Host "OK: protoc zip size = $((Get-Item $p).Length) bytes"

      - name: Package (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $src = "cmd/app"
          if (!(Test-Path $src)) { throw "Missing source dir: $src" }

          $icon = "assets/icon.png"
          if (Test-Path $icon) {
            fyne package --os windows --source-dir $src --name "Proto Viewer" --app-id com.i4erkasov.proto-viewer --icon $icon
          } else {
            Write-Host "Icon not found at $icon - packaging without icon"
            fyne package --os windows --source-dir $src --name "Proto Viewer" --app-id com.i4erkasov.proto-viewer
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proto-viewer-windows
          path: |
            **/*.exe
            **/*.msi
            **/*.zip
            **/dist/**
          if-no-files-found: warn
