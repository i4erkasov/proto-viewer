name: windows-build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  # Pin protoc version for reproducible builds
  PROTOC_VERSION: "29.3"

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Fyne CLI info
        run: |
          fyne --help
          fyne package --help

      - name: Download protoc (Windows x64) into repo path
        run: |
          $ErrorActionPreference = "Stop"

          $dst = "internal/infrastructure/protocbin/protoc_windows_amd64.zip"
          New-Item -ItemType Directory -Force -Path (Split-Path $dst) | Out-Null

          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v$env:PROTOC_VERSION/protoc-$env:PROTOC_VERSION-win64.zip"
          Write-Host "Downloading protoc from $url"

          try { [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12 } catch {}
          Invoke-WebRequest -Uri $url -OutFile $dst

      - name: Verify protoc zip present
        run: |
          $p = "internal/infrastructure/protocbin/protoc_windows_amd64.zip"
          if (!(Test-Path $p)) { throw "Missing $p" }
          if ((Get-Item $p).Length -eq 0) { throw "protoc zip is empty placeholder: $p" }
          Write-Host "OK: protoc zip size = $((Get-Item $p).Length) bytes"

      - name: Ensure icon exists (CI fallback)
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "PWD: $(Get-Location)"

          function Ensure-Icon([string]$path) {
            if (Test-Path $path) {
              Write-Host "Icon exists: $path ($(Get-Item $path).Length bytes)"
              return
            }

            Write-Host "Icon missing: $path - creating CI fallback icon"
            New-Item -ItemType Directory -Force -Path (Split-Path $path) | Out-Null

            # Valid tiny PNG (1x1) - enough for CI packaging
            $b64 = "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/P4v0WQAAAABJRU5ErkJggg=="
            [IO.File]::WriteAllBytes($path, [Convert]::FromBase64String($b64))

            Write-Host "Created icon: $path ($(Get-Item $path).Length bytes)"
          }

          # Fyne may look for icon relative to --source-dir, so ensure both.
          Ensure-Icon "assets/icon.png"
          Ensure-Icon "cmd/app/assets/icon.png"

          Write-Host "Icons present:"
          Get-ChildItem -Recurse -File -Filter icon.png -ErrorAction SilentlyContinue | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Package (Windows)
        run: |
          $ErrorActionPreference = "Stop"

          # Build exe from repo root using root go.mod
          $exeDir = "dist"
          New-Item -ItemType Directory -Force -Path $exeDir | Out-Null
          $exe = Join-Path $exeDir "proto-viewer.exe"
          go build -o $exe ./cmd/app

          $iconRel = "cmd/app/assets/icon.png"
          if (!(Test-Path $iconRel)) { throw "Missing icon: $iconRel" }
          $icon = (Resolve-Path $iconRel).Path
          Write-Host "Using icon: $icon ($((Get-Item $icon).Length) bytes)"

          fyne package --os windows --executable $exe --name "Proto Viewer" --app-id com.i4erkasov.proto-viewer --icon $icon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proto-viewer-windows
          path: |
            **/*.exe
            **/*.msi
            **/*.zip
            **/dist/**
          if-no-files-found: warn
